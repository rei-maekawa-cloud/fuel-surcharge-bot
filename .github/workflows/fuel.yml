name: fuel bot

on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python fuel_bot.py
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
